<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FuelX | Forgot Password</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:'Poppins',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)),
    url("https://images.unsplash.com/photo-1603386329225-868f9b1ee6f9") no-repeat center center/cover;
}

/* ── TOAST (slides in from top like a real app) ── */
#toast {
    position: fixed;
    top: -80px;
    left: 50%;
    transform: translateX(-50%);
    min-width: 280px;
    max-width: 340px;
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    text-align: center;
    z-index: 9999;
    transition: top 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
}
#toast.show  { top: 20px; }
#toast.success { background:#14532d; border:1px solid #22c55e; color:#86efac; }
#toast.error   { background:#450a0a; border:1px solid #ef4444; color:#fca5a5; }
#toast.info    { background:#1e3a5f; border:1px solid #3b82f6; color:#93c5fd; }

.card{
    background:rgba(0,0,0,0.65);
    padding:40px 30px;
    border-radius:10px;
    width:350px;
    text-align:center;
    color:white;
}
.card h2{ margin-bottom:20px; color:#facc15; }
input{
    width:100%; padding:12px;
    margin:8px 0; border:none;
    border-radius:5px;
    font-family:'Poppins',sans-serif;
    font-size:14px;
}
button{
    width:100%; padding:12px;
    margin-top:10px; border:none;
    border-radius:5px;
    background:linear-gradient(45deg,#facc15,#f97316);
    color:white; font-weight:600; cursor:pointer;
    font-family:'Poppins',sans-serif;
    font-size:14px;
}
button:hover{ opacity:0.9; }
button:disabled{ opacity:0.5; cursor:not-allowed; }
.link{ font-size:14px; margin-top:16px; }
.link a{ color:#facc15; text-decoration:none; }

.status-msg{
    display:none;
    margin-top:12px;
    padding:10px 14px;
    border-radius:6px;
    font-size:13px;
    font-weight:500;
    text-align:left;
}
.status-msg.success{
    display:block;
    background:rgba(34,197,94,0.12);
    border:1px solid rgba(34,197,94,0.35);
    color:#86efac;
}
.status-msg.error{
    display:block;
    background:rgba(239,68,68,0.12);
    border:1px solid rgba(239,68,68,0.35);
    color:#f87171;
}

#timerBox{
    display:none;
    margin-top:10px;
    padding:10px;
    border-radius:6px;
    background:rgba(255,255,255,0.08);
    font-size:14px;
}
#timerText{ color:#facc15; font-weight:600; font-size:16px; }
#expiredMsg{ display:none; color:#f97316; font-size:13px; margin-top:8px; }
</style>
</head>

<body>

<!-- TOAST — slides down from top -->
<div id="toast"></div>

<div class="card">
  <h2>Forgot Password</h2>

  <input type="email" id="email" placeholder="Enter Registered Email">
  <button onclick="sendOtp()" id="sendBtn">Send OTP</button>

  <input type="text" id="otp" placeholder="Enter OTP" style="display:none;">
  <button onclick="verifyOtp()" id="verifyBtn" style="display:none;">Verify OTP</button>

  <div id="timerBox">
    OTP valid for: <span id="timerText">05:00</span>
    <div id="expiredMsg">⚠️ OTP expired! Please request a new one.</div>
  </div>

  <button onclick="resendOtp()" id="resendBtn" style="display:none;">Resend OTP</button>

  <input type="password" id="newPassword" placeholder="Enter New Password" style="display:none;">
  <button onclick="resetPassword()" id="resetBtn" style="display:none;">Reset Password</button>

  <div class="status-msg" id="statusMsg"></div>

  <div class="link">
    <a href="login.html">← Back to Login</a>
  </div>
</div>

<script>
let currentEmail  = "";
let timerInterval = null;
let toastTimeout  = null;

/* ── TOAST ── */
function showToast(type, message, duration = 3000) {
  const toast     = document.getElementById("toast");
  toast.className = "show " + type;
  toast.textContent = message;
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => {
    toast.className = type; // slide back up
  }, duration);
}

/* ── INLINE STATUS ── */
function showStatus(type, message) {
  const el       = document.getElementById("statusMsg");
  el.className   = "status-msg " + type;
  el.textContent = message;
}
function hideStatus() {
  const el     = document.getElementById("statusMsg");
  el.className = "status-msg";
  el.textContent = "";
}

/* ── TIMER ── */
function startTimer(seconds) {
  clearInterval(timerInterval);
  document.getElementById("timerBox").style.display   = "block";
  document.getElementById("expiredMsg").style.display = "none";
  document.getElementById("timerText").style.color    = "#facc15";

  let remaining = seconds;

  timerInterval = setInterval(() => {
    remaining--;
    const mins = String(Math.floor(remaining / 60)).padStart(2, '0');
    const secs = String(remaining % 60).padStart(2, '0');
    document.getElementById("timerText").textContent = `${mins}:${secs}`;

    if (remaining <= 60)
      document.getElementById("timerText").style.color = "#ef4444";

    if (remaining <= 0) {
      clearInterval(timerInterval);
      document.getElementById("timerText").textContent    = "00:00";
      document.getElementById("expiredMsg").style.display = "block";
      document.getElementById("otp").disabled             = true;
      document.getElementById("verifyBtn").disabled       = true;
      document.getElementById("resendBtn").style.display  = "block";
      showToast("error", "⚠️ OTP expired! Request a new one.");
      showStatus("error", "⚠️ OTP expired! Please request a new one.");
    }
  }, 1000);
}

/* ── SEND OTP ── */
function sendOtp() {
  const email = document.getElementById("email").value.trim();
  if (!email) { showStatus("error", "⚠️ Please enter your email address."); return; }

  currentEmail    = email;
  const btn       = document.getElementById("sendBtn");
  btn.disabled    = true;
  btn.textContent = "Sending...";
  hideStatus();

  fetch("http://localhost:5000/api/send-otp", {
    method:  "POST",
    headers: { "Content-Type": "application/json" },
    body:    JSON.stringify({ email })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success === true) {
      showToast("success", "📧 OTP sent to " + email, 4000);
      showStatus("success", "✅ OTP sent! Check your email inbox.");
      document.getElementById("otp").style.display       = "block";
      document.getElementById("verifyBtn").style.display = "block";
      btn.textContent = "OTP Sent ✓";
      startTimer(300);
    } else {
      showToast("error", "❌ Email not registered.");
      showStatus("error", "❌ Email not found. Please check and try again.");
      btn.disabled    = false;
      btn.textContent = "Send OTP";
    }
  })
  .catch(() => {
    showToast("error", "❌ Server error. Please try again.");
    showStatus("error", "❌ Server error. Please try again.");
    btn.disabled    = false;
    btn.textContent = "Send OTP";
  });
}

/* ── RESEND OTP ── */
function resendOtp() {
  document.getElementById("otp").value                = "";
  document.getElementById("otp").disabled             = false;
  document.getElementById("verifyBtn").disabled       = false;
  document.getElementById("resendBtn").style.display  = "none";
  document.getElementById("expiredMsg").style.display = "none";
  hideStatus();

  fetch("http://localhost:5000/api/send-otp", {
    method:  "POST",
    headers: { "Content-Type": "application/json" },
    body:    JSON.stringify({ email: currentEmail })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success === true) {
      showToast("success", "📧 New OTP sent to " + currentEmail, 4000);
      
      startTimer(300);
    } else {
      showToast("error", "❌ Could not resend OTP.");
      showStatus("error", "❌ Could not resend OTP. Please try again.");
    }
  })
  .catch(() => {
    showToast("error", "❌ Server error. Please try again.");
    showStatus("error", "❌ Server error. Please try again.");
  });
}

/* ── VERIFY OTP ── */
function verifyOtp() {
  const otp = document.getElementById("otp").value.trim();
  if (!otp) { showStatus("error", "⚠️ Please enter the OTP."); return; }
  hideStatus();

  fetch("http://localhost:5000/api/verify-otp", {
    method:  "POST",
    headers: { "Content-Type": "application/json" },
    body:    JSON.stringify({ email: currentEmail, otp })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success === true) {
      showToast("success", "✅ OTP verified successfully!");
      showStatus("success", "✅ OTP verified! Set your new password below.");
      clearInterval(timerInterval);
      document.getElementById("timerBox").style.display    = "none";
      document.getElementById("otp").style.display         = "none";
      document.getElementById("verifyBtn").style.display   = "none";
      document.getElementById("resendBtn").style.display   = "none";
      document.getElementById("newPassword").style.display = "block";
      document.getElementById("resetBtn").style.display    = "block";
    } else {
      showToast("error", "❌ Incorrect OTP. Try again.");
      showStatus("error", "❌ Incorrect OTP. Please check and try again.");
    }
  })
  .catch(() => {
    showToast("error", "❌ Server error. Please try again.");
    showStatus("error", "❌ Server error. Please try again.");
  });
}

/* ── RESET PASSWORD ── */
function resetPassword() {
  const newPassword = document.getElementById("newPassword").value.trim();
  if (!newPassword)           { showStatus("error", "⚠️ Please enter a new password."); return; }
  if (newPassword.length < 6) { showStatus("error", "⚠️ Password must be at least 6 characters."); return; }
  hideStatus();

  fetch("http://localhost:5000/api/reset-password", {
    method:  "POST",
    headers: { "Content-Type": "application/json" },
    body:    JSON.stringify({ email: currentEmail, newPassword })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success === true) {

      // ── Clear session so user must login again with new password ──
      localStorage.removeItem("isLoggedIn");
      localStorage.removeItem("userName");
      localStorage.removeItem("userEmail");
      localStorage.removeItem("userMobile");

      showToast("success", "🔐 Password reset! Please login again.", 2500);
      showStatus("success", "✅ Password reset successful! Redirecting to login...");
      setTimeout(() => { window.location.href = "login.html"; }, 2000);

    } else {
      showToast("error", "❌ Could not reset password.");
      showStatus("error", "❌ Could not reset password. Please try again.");
    }
  })
  .catch(() => {
    showToast("error", "❌ Server error. Please try again.");
    showStatus("error", "❌ Server error. Please try again.");
  });
}
</script>
</body>
</html>
