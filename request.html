<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuel Request | FuelX</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── LIGHT MODE (default) ── */
:root {
  --bg: #f4f6fb;
  --card-bg: #ffffff;
  --card-border: rgba(0,0,0,0.08);
  --navbar-bg: #ffffff;
  --navbar-border: rgba(0,0,0,0.08);
  --text: #1a1a2e;
  --muted: #6b7280;
  --placeholder: #9ca3af;
  --input-bg: rgba(0,0,0,0.04);
  --input-border: rgba(0,0,0,0.12);
  --fuel-opt-bg: rgba(0,0,0,0.03);
  --fuel-opt-border: rgba(0,0,0,0.10);
  --fuel-selected-border: #f97316;
  --fuel-selected-bg: rgba(249,115,22,0.08);
  --fuel-selected-name: #f97316;
  --qty-btn-bg: #f0f0f0;
  --qty-btn-border: rgba(0,0,0,0.12);
  --qty-color: #f97316;
  --total-bg: rgba(249,115,22,0.07);
  --total-border: rgba(249,115,22,0.20);
  --total-val: #f97316;
  --hint-info: #f97316;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
}

/* ── DARK MODE ── */
body.dark {
  --bg: #07050a;
  --card-bg: rgba(0,0,0,0.65);
  --card-border: #333333;
  --navbar-bg: rgba(7,5,10,0.97);
  --navbar-border: #333333;
  --text: #f0f0f0;
  --muted: #9ca3af;
  --placeholder: #555555;
  --input-bg: rgba(255,255,255,0.08);
  --input-border: #333333;
  --fuel-opt-bg: rgba(255,255,255,0.06);
  --fuel-opt-border: #333333;
  --fuel-selected-border: #facc15;
  --fuel-selected-bg: rgba(250,204,21,0.10);
  --fuel-selected-name: #facc15;
  --qty-btn-bg: #222222;
  --qty-btn-border: #444444;
  --qty-color: #facc15;
  --total-bg: rgba(250,204,21,0.08);
  --total-border: rgba(250,204,21,0.20);
  --total-val: #facc15;
  --hint-info: #facc15;
  --shadow: 0 4px 24px rgba(0,0,0,0.5);
}

/* ── DARK MODE: fuel-station background ── */
body.dark {
  background:
    linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)),
    url("https://images.unsplash.com/photo-1603386329225-868f9b1ee6f9") no-repeat center/cover fixed;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Poppins', sans-serif;
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  transition: background 0.3s, color 0.3s;
}

/* ── NAVBAR ── */
.navbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  background: var(--navbar-bg);
  border-bottom: 1px solid var(--navbar-border);
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(20px);
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  transition: background 0.3s, border-color 0.3s;
}

.back-btn {
  width: 34px; height: 34px;
  background: var(--input-bg);
  border: 1px solid var(--input-border);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  text-decoration: none;
  color: var(--text);
  font-size: 16px;
  transition: background 0.2s, border-color 0.2s;
}
.back-btn:hover { border-color: #f97316; background: rgba(249,115,22,0.1); }

.logo { font-size: 20px; font-weight: 700; color: var(--text); }
.logo span { color: #f97316; }

/* ── CARD ── */
.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: 28px 24px;
  margin: 24px 16px;
  box-shadow: var(--shadow);
  transition: background 0.3s, border-color 0.3s;
}

.card h2 {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 20px;
  text-align: center;
  color: #f97316;
}
body.dark .card h2 { color: #facc15; }

/* ── FIELDS ── */
.field { margin-bottom: 14px; }
.field label {
  font-size: 12px;
  color: var(--muted);
  font-weight: 500;
  display: block;
  margin-bottom: 6px;
}

.field input {
  width: 100%;
  padding: 12px 14px;
  background: var(--input-bg);
  border: 1px solid var(--input-border);
  border-radius: 10px;
  color: var(--text);
  font-family: 'Poppins', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s, background 0.3s, color 0.3s;
}
.field input::placeholder { color: var(--placeholder); }
.field input:focus { border-color: #f97316; }
body.dark .field input:focus { border-color: #facc15; }

/* ── VEHICLE HINT ── */
.vehicle-hint { font-size: 11px; margin-top: 5px; min-height: 16px; transition: color 0.2s; }
.vehicle-hint.valid   { color: #22c55e; }
.vehicle-hint.invalid { color: #ef4444; }
.vehicle-hint.neutral { color: var(--muted); }
.vehicle-hint.info    { color: var(--hint-info); }

/* ── FUEL OPTIONS ── */
.fuel-row { display: flex; gap: 10px; margin-bottom: 14px; }
.fuel-opt {
  flex: 1;
  background: var(--fuel-opt-bg);
  border: 2px solid var(--fuel-opt-border);
  border-radius: 12px;
  padding: 14px 8px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
}
.fuel-opt.selected {
  border-color: var(--fuel-selected-border);
  background: var(--fuel-selected-bg);
}
.fuel-opt .icon { font-size: 22px; margin-bottom: 4px; }
.fuel-opt .name { font-size: 13px; font-weight: 600; color: var(--muted); }
.fuel-opt .price { font-size: 11px; color: var(--placeholder); margin-top: 2px; }
.fuel-opt.selected .name { color: var(--fuel-selected-name); }

/* ── QTY ── */
.qty-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.qty-btn {
  width: 34px; height: 34px;
  background: var(--qty-btn-bg);
  border: 1px solid var(--qty-btn-border);
  border-radius: 50%;
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
  font-family: 'Poppins', sans-serif;
  transition: border-color 0.2s, background 0.2s;
}
.qty-btn:hover { border-color: #f97316; background: rgba(249,115,22,0.1); }
.qty-display { flex: 1; text-align: center; font-size: 20px; font-weight: 700; color: var(--qty-color); }
.qty-sub { font-size: 11px; color: var(--muted); text-align: center; margin-bottom: 14px; }

/* ── TOTAL ── */
.total-row {
  display: flex;
  justify-content: space-between;
  background: var(--total-bg);
  border: 1px solid var(--total-border);
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 20px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  transition: background 0.3s, border-color 0.3s;
}
.total-row span:last-child { color: var(--total-val); }

/* ── BUTTONS ── */
.submit-btn {
  width: 100%; padding: 14px; border: none; border-radius: 12px;
  background: linear-gradient(45deg, #facc15, #f97316);
  color: #000; font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: 'Poppins', sans-serif;
  transition: opacity 0.2s, transform 0.2s;
}
.submit-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.gps-btn {
  width: 100%; padding: 10px;
  background: rgba(37,99,235,0.08);
  border: 1px solid rgba(37,99,235,0.25);
  border-radius: 10px;
  color: #60a5fa;
  font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: 'Poppins', sans-serif;
  margin-top: 8px;
  transition: border-color 0.2s, opacity 0.2s;
}
.gps-btn:hover:not(:disabled) { border-color: rgba(37,99,235,0.5); }
.gps-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── STATUS ── */
.status-msg { text-align: center; font-size: 12px; margin-top: 10px; padding: 8px; border-radius: 8px; display: none; }
.status-msg.error   { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; display: block; }
.status-msg.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #86efac; display: block; }
</style>
</head>
<body>

<script>
  // ══════════════════════════════════════════════════════
  //  THEME SYNC — runs BEFORE the page renders
  //  Reads the SAME key ('fuelx_theme') saved by dashboard.html
  // ══════════════════════════════════════════════════════
  (function () {
    const theme = localStorage.getItem('fuelx_theme') || 'light';
    if (theme === 'dark') document.body.classList.add('dark');
  })();
</script>

<div class="navbar">
  <a href="dashboard.html" class="back-btn">&#8592;</a>
  <div class="logo">Fuel<span>X</span></div>
</div>

<div class="card">
  <h2>&#9981; Request Fuel</h2>

  <div class="field">
    <label>&#128664; Vehicle Number (All India)</label>
    <input type="text" id="vehicleNumber"
           placeholder="e.g. MH12AB1234 / DL4CAB1234 / KA03MJ5678"
           maxlength="11"
           style="text-transform:uppercase;">
    <div class="vehicle-hint neutral" id="vehicleHint">Enter your vehicle number — all Indian states &amp; UTs accepted</div>
  </div>

  <div class="field">
    <label>&#9981; Fuel Type</label>
    <div class="fuel-row">
      <div class="fuel-opt selected" id="opt-petrol" onclick="selectFuel('Petrol')">
        <div class="icon">&#128993;</div>
        <div class="name">Petrol</div>
        <div class="price">&#8377;104/L</div>
      </div>
      <div class="fuel-opt" id="opt-diesel" onclick="selectFuel('Diesel')">
        <div class="icon">&#128994;</div>
        <div class="name">Diesel</div>
        <div class="price">&#8377;92/L</div>
      </div>
    </div>
  </div>

  <div class="field">
    <label>&#128202; Quantity (Max 1L)</label>
    <div class="qty-row">
      <button class="qty-btn" onclick="changeQty(-0.1)">&#8722;</button>
      <div class="qty-display"><span id="qtyDisplay">0.5</span> L</div>
      <button class="qty-btn" onclick="changeQty(0.1)">+</button>
    </div>
    <div class="qty-sub">Min 0.1L &mdash; Max 1.0L</div>
  </div>

  <div class="field">
    <label>&#128205; Your Location</label>
    <input type="text" id="location" placeholder="Enter building / street / area name...">
    <button class="gps-btn" id="gpsBtn" onclick="getLocation()">&#128225; Use Current Location</button>
  </div>

  <div class="total-row">
    <span>Total Payable</span>
    <span id="totalDisplay">&#8377;57.00</span>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="goToPump()">
    Select Petrol Pump &#8594;
  </button>

  <div class="status-msg" id="statusMsg"></div>
</div>

<script>
// ── STATE CODES ──
const STATE_CODES = {
  'AN':'Andaman & Nicobar Islands','AP':'Andhra Pradesh','AR':'Arunachal Pradesh',
  'AS':'Assam','BR':'Bihar','CG':'Chhattisgarh','CH':'Chandigarh','DD':'Daman & Diu',
  'DL':'Delhi','DN':'Dadra & Nagar Haveli','GA':'Goa','GJ':'Gujarat',
  'HP':'Himachal Pradesh','HR':'Haryana','JH':'Jharkhand','JK':'Jammu & Kashmir',
  'KA':'Karnataka','KL':'Kerala','LA':'Ladakh','LD':'Lakshadweep','MH':'Maharashtra',
  'ML':'Meghalaya','MN':'Manipur','MP':'Madhya Pradesh','MZ':'Mizoram','NL':'Nagaland',
  'OD':'Odisha','PB':'Punjab','PY':'Puducherry','RJ':'Rajasthan','SK':'Sikkim',
  'TN':'Tamil Nadu','TR':'Tripura','TS':'Telangana','UK':'Uttarakhand',
  'UP':'Uttar Pradesh','WB':'West Bengal'
};

function validateVehicleNumber(num) {
  const match = num.match(/^([A-Z]{2})([0-9]{2})([A-Z]{1,2})([0-9]{4})$/);
  if (!match) return { valid: false, reason: 'Invalid format! Example: MH12AB1234' };
  if (!STATE_CODES[match[1]]) return { valid: false, reason: '"' + match[1] + '" is not a valid state/UT code' };
  if (parseInt(match[2]) === 0) return { valid: false, reason: 'District number cannot be 00' };
  if (parseInt(match[4]) === 0) return { valid: false, reason: 'Vehicle serial number cannot be 0000' };
  return { valid: true, stateName: STATE_CODES[match[1]] };
}

document.getElementById('vehicleNumber').addEventListener('input', function () {
  const val  = this.value.toUpperCase().replace(/\s/g, '');
  this.value = val;
  const hint = document.getElementById('vehicleHint');
  if (val.length === 0) {
    this.style.borderColor = '';
    hint.className = 'vehicle-hint neutral';
    hint.textContent = 'Enter your vehicle number — all Indian states & UTs accepted';
    return;
  }
  if (val.length >= 2) {
    const stateName = STATE_CODES[val.substring(0, 2)];
    if (val.length < 8) {
      if (stateName) {
        this.style.borderColor = '#f97316';
        hint.className = 'vehicle-hint info';
        hint.textContent = 'State detected: ' + stateName + ' — keep typing...';
      } else if (val.length === 2) {
        this.style.borderColor = '#ef4444';
        hint.className = 'vehicle-hint invalid';
        hint.textContent = '"' + val.substring(0,2) + '" is not a valid state/UT code';
      } else {
        this.style.borderColor = '#f97316';
        hint.className = 'vehicle-hint neutral';
        hint.textContent = 'Keep typing...';
      }
      return;
    }
    const check = validateVehicleNumber(val);
    if (check.valid) {
      this.style.borderColor = '#22c55e';
      hint.className = 'vehicle-hint valid';
      hint.textContent = 'Valid — Registered in ' + check.stateName;
    } else {
      this.style.borderColor = '#ef4444';
      hint.className = 'vehicle-hint invalid';
      hint.textContent = check.reason;
    }
  }
});

// ── FUEL & QTY ──
let selectedFuel = 'Petrol';
const prices = { Petrol: 104, Diesel: 92 };
let qty = 0.5;

function selectFuel(type) {
  selectedFuel = type;
  document.querySelectorAll('.fuel-opt').forEach(el => el.classList.remove('selected'));
  document.getElementById('opt-' + type.toLowerCase()).classList.add('selected');
  updateTotal();
}

function changeQty(delta) {
  qty = Math.min(1, Math.max(0.1, parseFloat((qty + delta).toFixed(1))));
  document.getElementById('qtyDisplay').textContent = qty.toFixed(1);
  updateTotal();
}

function updateTotal() {
  document.getElementById('totalDisplay').textContent = '\u20B9' + (qty * prices[selectedFuel] + 5).toFixed(2);
}

// ── GPS ──
function getLocation() {
  if (!window.isSecureContext) {
    showStatus('error', 'Location requires HTTPS. Serve via https:// or localhost.');
    return;
  }
  if (!navigator.geolocation) { showStatus('error', 'GPS not supported.'); return; }

  const btn = document.getElementById('gpsBtn');
  btn.textContent = 'Getting location...';
  btn.disabled = true;

  navigator.geolocation.getCurrentPosition(async (pos) => {
    try {
      const res = await fetch(
        'https://nominatim.openstreetmap.org/reverse?lat=' + pos.coords.latitude + '&lon=' + pos.coords.longitude + '&format=json&addressdetails=1&zoom=18',
        { headers: { 'Accept-Language': 'en' } }
      );
      const data = await res.json();
      const addr = data.address || {};
      const rawParts = [
        addr.amenity||'', addr.building||'', addr.house_name||'', addr.hotel||'',
        (addr.house_number && addr.road) ? addr.house_number+', '+addr.road : (addr.road||addr.pedestrian||addr.footway||''),
        addr.neighbourhood||addr.quarter||'', addr.suburb||addr.residential||'',
        addr.village||addr.town||addr.city_district||addr.city||'',
        addr.district||addr.county||'', addr.state||''
      ];
      const parts = rawParts.map(p => p.trim()).filter(Boolean);
      const unique = parts.filter((p, i) => p.toLowerCase() !== (parts[i-1]||'').toLowerCase());
      document.getElementById('location').value = unique.join(', ');
      showStatus('success', 'Location fetched successfully!');
    } catch (e) {
      document.getElementById('location').value = pos.coords.latitude.toFixed(6) + ', ' + pos.coords.longitude.toFixed(6);
      showStatus('success', 'Coordinates saved. Edit manually if needed.');
    }
    btn.textContent = '📡 Use Current Location';
    btn.disabled = false;
  }, (err) => {
    btn.textContent = '📡 Use Current Location';
    btn.disabled = false;
    const msgs = { 1: 'Permission denied! Allow location in browser settings.', 2: 'Position unavailable. Check GPS is ON.', 3: 'Timed out. Try again or enter manually.' };
    showStatus('error', msgs[err.code] || 'Unknown error. Enter location manually.');
  }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
}

// ── STATUS ──
function showStatus(type, msg) {
  const el = document.getElementById('statusMsg');
  el.className = type ? 'status-msg ' + type : 'status-msg';
  el.textContent = msg || '';
}

// ── SUBMIT ──
async function goToPump() {
  const vehicle  = document.getElementById('vehicleNumber').value.trim().toUpperCase();
  const location = document.getElementById('location').value.trim();

  if (!vehicle) { showStatus('error', 'Please enter your vehicle number!'); return; }
  const check = validateVehicleNumber(vehicle);
  if (!check.valid) { showStatus('error', check.reason); return; }
  if (!location) { showStatus('error', 'Please enter your location!'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Saving...';
  showStatus('', '');

  const pumpURL = 'pump.html?vehicle=' + encodeURIComponent(vehicle)
    + '&fuel=' + encodeURIComponent(selectedFuel)
    + '&qty='  + encodeURIComponent(qty)
    + '&location=' + encodeURIComponent(location);

  localStorage.setItem('userPlate', vehicle);
  localStorage.setItem('userFuel',  selectedFuel);

  try {
    const res = await fetch('http://localhost:5000/api/request-fuel', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ vehicle, fuel: selectedFuel, qty, location })
    });
    const result = await res.json();
    if (result.success) {
      showStatus('success', 'Saved! Going to pump selection...');
      setTimeout(() => { window.location.href = pumpURL; }, 800);
    } else throw new Error(result.message || 'Server error');
  } catch (err) {
    showStatus('error', 'Server issue. Going to pump selection anyway...');
    setTimeout(() => { window.location.href = pumpURL; }, 1200);
  }

  setTimeout(() => { btn.disabled = false; btn.textContent = 'Select Petrol Pump \u2192'; }, 3000);
}
</script>
</body>
</html>
